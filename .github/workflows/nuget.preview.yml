name: Publish Preview

on:
  push:
    branches:
      - develop

  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.x"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  build-pack-publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - Zooper.Tools.Marten.ApplyEnforcer.Analyzers/Zooper.Tools.Marten.ApplyEnforcer.Analyzers.csproj
          - Zooper.Tools.Marten.ApplyEnforcer.Contracts/Zooper.Tools.Marten.ApplyEnforcer.Contracts.csproj

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ matrix.project }}"

      - name: Build
        run: dotnet build "${{ matrix.project }}" --configuration Release --no-restore

      - name: Pack
        run: dotnet pack "${{ matrix.project }}" --configuration Release --no-build --output ./nupkg

      - name: Publish
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
